<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 50%, #000 100%);
      color: #e5e7eb;
      text-align: center;
      overflow-x: hidden;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      margin-top: 0;
      margin-bottom: 16px;
      max-width: 420px;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Secret zone */

    #secret-section {
      margin-top: 24px;
      padding: 14px 16px 16px;
      border-radius: 16px;
      border: 1px solid rgba(96, 165, 250, 0.5);
      background: rgba(15, 23, 42, 0.9);
      max-width: 360px;
      width: 100%;
    }

    #secret-section h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    #secret-section p {
      font-size: 0.85rem;
      margin-bottom: 12px;
      opacity: 0.8;
    }

    #secret-code {
      width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(96, 165, 250, 0.7);
      background: rgba(15, 23, 42, 0.95);
      color: #e5e7eb;
      outline: none;
      font-size: 0.9rem;
    }

    #secret-code:focus {
      border-color: #a855f7;
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.5);
    }

    #secret-btn {
      margin-top: 10px;
      width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      color: #f9fafb;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #secret-btn:hover {
      filter: brightness(1.06);
    }

    #secret-feedback {
      margin-top: 8px;
      font-size: 0.8rem;
      min-height: 16px;
      opacity: 0.9;
    }

    #secret-feedback.error {
      color: #fb7185;
    }

    #secret-feedback.ok {
      color: #6ee7b7;
    }

    /* BRAINROT OVERLAY */

    #brainrot-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #020617 0, #020617 35%, #000 100%);
      color: #f9fafb;
      display: none;
      overflow: hidden;
      z-index: 9999;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #brainrot-overlay.active {
      display: block;
    }

    #brainrot-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      text-align: center;
    }

    #brainrot-title {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
      text-shadow: 0 0 20px #ec4899, 0 0 40px #6366f1;
    }

    #brainrot-sub {
      font-size: 0.9rem;
      max-width: 260px;
      opacity: 0.85;
    }

    #brainrot-exit {
      position: absolute;
      bottom: 12px;
      right: 12px;
      border-radius: 999px;
      border: 0;
      padding: 6px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      border: 1px solid rgba(148, 163, 184, 0.7);
      pointer-events: auto;
    }

    #brainrot-exit:hover {
      background: rgba(30, 64, 175, 0.9);
    }

    #floating-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .floating-text {
      position: absolute;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
      animation: float 8s infinite ease-in-out, hue 5s infinite linear;
      mix-blend-mode: screen;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
    }

    @keyframes float {
      0%   { transform: translate3d(0, 0, 0) rotate(0deg);   opacity: 0; }
      10%  { opacity: 1; }
      50%  { transform: translate3d(40px, -60px, 0) rotate(4deg); }
      90%  { opacity: 1; }
      100% { transform: translate3d(-30px, 50px, 0) rotate(-3deg); opacity: 0; }
    }

    @keyframes hue {
      0%   { filter: hue-rotate(0deg); }
      50%  { filter: hue-rotate(180deg); }
      100% { filter: hue-rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>Work in progress… 👷‍♂️</h1>
  <p>This portfolio is under construction. Come back soon to discover my projects and achievements!</p>

  <!-- Rickroll comme avant -->
  <a href="#"
     title="Don't click please"
     onclick="event.preventDefault();
      const v=document.createElement('video');
      v.src='Rickroll.mp4';
      v.autoplay=true;
      v.volume=1;
      v.muted=false;
      v.style.maxWidth='100%';
      document.body.appendChild(v);
      v.play();">
    Click here
  </a>

  <!-- Secret code section -->
  <div id="secret-section">
    <h2>Secret zone 🔐</h2>
    <p>Si tu sais, tu sais.</p>
    <input id="secret-code" type="text" placeholder='Code ?' autocomplete="off">
    <button id="secret-btn">Valider</button>
    <div id="secret-feedback"></div>
  </div>

  <!-- Brainrot overlay -->
  <div id="brainrot-overlay">
    <div id="floating-container"></div>

    <div id="brainrot-center">
      <div id="brainrot-title">FOR JULIETTE</div>
      <div id="brainrot-sub">c’est trop tard, t’es dans ma tête 🧠✨</div>
    </div>

    <button id="brainrot-exit">Retour au calme</button>
  </div>

  <script>
    const secretInput = document.getElementById("secret-code");
    const secretBtn = document.getElementById("secret-btn");
    const feedback = document.getElementById("secret-feedback");
    const overlay = document.getElementById("brainrot-overlay");
    const floatingContainer = document.getElementById("floating-container");
    const exitBtn = document.getElementById("brainrot-exit");

    const SECRET_CODE = "For Juliette";

    const phrases = [
      "Viens on baise",
      "t'as la dalle et t'as envie de ken",
      "fais miaou",
      "MOMMY",
      "miaule pour moi Juliette",
      "viens ici",
      "Interstellar & chill",
      "je te veux",
      "reste là",
      "ton cerveau me fume",
      "viens dans mes bras",
      "t'es à moi ce soir"
    ];

    function openBrainrot() {
      overlay.classList.add("active");
      document.body.style.overflow = "hidden";
      spawnFloatingTexts();
    }

    function closeBrainrot() {
      overlay.classList.remove("active");
      document.body.style.overflow = "";
      floatingContainer.innerHTML = "";
    }

    function spawnFloatingTexts() {
      const count = 40; // nombre de textes qui volent
      floatingContainer.innerHTML = "";

      for (let i = 0; i < count; i++) {
        const span = document.createElement("span");
        span.className = "floating-text";
        span.textContent = phrases[Math.floor(Math.random() * phrases.length)];

        span.style.left = Math.random() * 100 + "vw";
        span.style.top = Math.random() * 100 + "vh";
        span.style.animationDuration = 6 + Math.random() * 6 + "s";
        span.style.fontSize = 0.8 + Math.random() * 1.7 + "rem";

        floatingContainer.appendChild(span);
      }
    }

    secretBtn.addEventListener("click", () => {
      const value = secretInput.value.trim();

      if (value === SECRET_CODE) {
        feedback.textContent = "Ok... t'étais pas censée trouver ça 😳";
        feedback.className = "ok";
        openBrainrot();
      } else {
        feedback.textContent = "Mauvais code. Essaie encore. 😉";
        feedback.className = "error";
      }
    });

    secretInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        secretBtn.click();
      }
    });

    exitBtn.addEventListener("click", () => {
      closeBrainrot();
    });
  </script>
</body>
</html>
